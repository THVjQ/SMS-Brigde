name: Build and publish sms-bridge image

on:
  push:
    branches: [main]
    paths:
      - 'sms-bridge/sospos-tools/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./sms-bridge/sospos-tools
          push: true
          tags: |
            ghcr.io/thvjq/sms-bridge:latest
            ghcr.io/thvjq/sms-bridge:${{ github.sha }}
